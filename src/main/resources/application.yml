spring:
  application:
    name: todoapp

  # Default profile: H2 in-memory for development
  # Switch to PostgreSQL: --spring.profiles.active=postgres
  datasource:
    url: jdbc:h2:mem:todoapp
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      auto-startup: false

# Config de IA (Groq/Llama 3 via OpenAI-compatible API):
# Ativado via variável de ambiente LLAMA_API_KEY (setada no Cloud Run ou .env.local)
# Sem a chave, o MockTaskSuggester é usado automaticamente (fallback)

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
