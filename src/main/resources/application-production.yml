# Profile: production
# Usado em: Cloud Run (GCP)
# Banco: Neon (PostgreSQL) — exige sslmode=require
# Kafka: Aiven Kafka Free Tier — exige SASL_SSL + SCRAM-SHA-256
#
# Todas as credenciais vêm de variáveis de ambiente configuradas no Cloud Run

spring:
  datasource:
    # Neon: sslmode=require é obrigatório
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    properties:
      sasl:
        jaas:
          config: org.apache.kafka.common.security.scram.ScramLoginModule required username='${KAFKA_SASL_USERNAME}' password='${KAFKA_SASL_PASSWORD}';
        mechanism: SCRAM-SHA-256
      security:
        protocol: SASL_SSL
      session:
        timeout:
          ms: 45000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
      group-id: todoapp-production
      auto-offset-reset: earliest
    listener:
      auto-startup: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  structured:
    format:
      console: logstash

# Desabilitar Swagger/OpenAPI em produção
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
