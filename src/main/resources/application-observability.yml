management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    enabled: ${OBSERVABILITY_TRACING_ENABLED:false}
    sampling:
      probability: ${OBSERVABILITY_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
      export:
        enabled: ${OBSERVABILITY_TRACING_ENABLED:false}
